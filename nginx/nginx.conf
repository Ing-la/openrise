events {
    worker_connections 1024;
}

http {
    # 使用 Docker 内置 DNS，运行时解析（避免 frontend 未就绪时 nginx 启动失败）
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 生产环境 HTTPS 配置示例（需要 Let's Encrypt 证书）
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #
    #     location /.well-known/acme-challenge/ {
    #         root /var/www/certbot;
    #     }
    #
    #     location / {
    #         return 301 https://$host$request_uri;
    #     }
    # }
    #
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     set $frontend_upstream http://frontend:3000;
    #
    #     # ... 以下 location 配置与下面的开发配置相同
    # }

    # 开发环境配置（HTTP）
    server {
        listen 80;
        server_name _;

        set $frontend_upstream http://frontend:3000;

        # 静态资源缓存
        location /_next/static {
            proxy_pass $frontend_upstream;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, immutable, max-age=604800";
        }

        location /images {
            proxy_pass $frontend_upstream;
            add_header Cache-Control "public, max-age=86400";
        }

        # MinIO上传文件访问代理
        location /uploads/ {
            set $minio_upstream http://minio:9000;
            # 移除rewrite规则，直接代理到MinIO的/uploads路径
            proxy_pass $minio_upstream;
            proxy_http_version 1.1;
            # MinIO需要原始Host头来正确处理路径
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-id-2;
            add_header Cache-Control "public, max-age=86400";
        }

        # API 请求（含文件上传，需放宽请求体限制）
        location /api {
            client_max_body_size 50m;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # 其他请求（SSR、页面）
        location / {
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
